
[project]
name = "acoupipe"
dynamic = ["version"]
description = "Library for the generation of large-scale microphone array data for machine learning"
requires-python = ">=3.11,<3.14"
authors = [
    {name = "Acoular Development Team", email = "info@acoular.org"},
]
readme = "README.rst"
license = {file = "LICENSE.txt"}
keywords = [
    "acoustics",
    "beamforming",
    "deep learning",
    "machine learning",
    "microphone array",
    "sound source localization",
    "sound source characterization",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Physics",
    "License :: OSI Approved :: BSD License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
	'acoular>=26.1',
	'ray[default]',
	'h5py',
	'tqdm',
    'irdl',
]
maintainers = [
    {name = "Adam Kujawski", email = "adam.kujawski@tu-berlin.de"},
    {name = "Art Pelling", email = "a.pelling@tu-berlin.de"},
]

[dependency-groups]
docs = [
    "ipython",
    "graphviz",
    "matplotlib",
    "numpydoc",
    "ipykernel",
    "nb-clean",
    "sphinx",
    "sphinx-autoapi",
    "sphinx-design",
    "nbsphinx",
    "pydata-sphinx-theme",
    "sphinx-gallery",
    "sphinxcontrib.bibtex",
    "pandoc",
]

lint = [
    "acoular-ruff @ git+https://github.com/acoular/ci.git@ruff-v1.0",
]

unsupported = [
    "pyroomacoustics",
]

tests = [
    "diff_cover",
    "pytest",
    "pytest-cov",
    "pytest-regtest",
    "pyyaml",
    "pandas",
    "tensorflow",
]

dev = [
    {include-group = "docs"},
    {include-group = "lint"},
    {include-group = "tests"},
]

[tool.ruff]
extend = ".venv/share/ruff/ruff.acoular.toml"
src = ["src"]
extend-exclude = ["docs/source"]   # shared config's exclude resolves to its own dir, not the project root

[tool.ruff.lint]
extend-ignore = [

    # ===== Temporary migration guards (removed in the noted sub-issue) =====
    "I001", "F401", "E402", "PLR0402",   # 2    imports: sorting / unused / placement / from-import
    "ICN001", "ICN003",                  # 2    import aliases
    "E501", "W505",                      # 3-8  line-length / docstring-length
    "G004", "LOG015",                    # 11   logging
    "PGH004", "RUF100", "E741",          # 10   stale-noqa cleanup / ambiguous names
    "S307",                              # 10   intentional eval() in sampler
    # no dedicated sub-issue -> general code cleanup, remove last
    "RUF015", "RUF021", "C419", "SIM108", "SIM114",  # 15
    "PLR5501", "PLR1711", "PLW0120",                 # 15
    "TRY",                                           # 15  exception style (TRY003/004/201)
    "EXE002",                                        # 15  exec bit (or `chmod -x src/acoupipe/*.py`)
    # whitespace / formatting trivia
    "W291", "W293", "COM819", "D210", "D403", "PLR2044",  # 15 (better cleared by `ruff format`)

    # ===== Mirror Acoular's pyproject (fix at the end, no subissue) =====
    "FBT002", "FBT003",  
    "PTH",               #   os.path -> pathlib
    "NPY002",            #   legacy numpy RNG
    "PERF4",             #   list-comprehension perf
    "PLR2004",           #   magic-value comparison
    "PLR091",            #   too many args/branches/returns/statements
    "PLW2901",           #   overwritten loop variable
    "RUF005",            #   iterable concatenation
    "RUF059",            #   unused unpacked variable
]

[tool.ruff.format]
docstring-code-line-length = "dynamic" # 3-8: Acoular uses 120, kept "dynamic" to for passes to check,

