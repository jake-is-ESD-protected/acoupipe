
[project]
name = "acoupipe"
dynamic = ["version"]
description = "Library for the generation of large-scale microphone array data for machine learning"
requires-python = ">=3.11,<3.14"
authors = [
    {name = "Acoular Development Team", email = "info@acoular.org"},
]
readme = "README.rst"
license = {file = "LICENSE.txt"}
keywords = [
    "acoustics",
    "beamforming",
    "deep learning",
    "machine learning",
    "microphone array",
    "sound source localization",
    "sound source characterization",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Physics",
    "License :: OSI Approved :: BSD License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
	'acoular>=26.1',
	'ray[default]',
	'h5py',
	'tqdm',
    'irdl',
]
maintainers = [
    {name = "Adam Kujawski", email = "adam.kujawski@tu-berlin.de"},
    {name = "Art Pelling", email = "a.pelling@tu-berlin.de"},
]

[dependency-groups]
docs = [
    "ipython",
    "graphviz",
    "matplotlib",
    "numpydoc",
    "ipykernel",
    "nb-clean",
    "sphinx",
    "sphinx-autoapi",
    "sphinx-design",
    "nbsphinx",
    "pydata-sphinx-theme",
    "sphinx-gallery",
    "sphinxcontrib.bibtex",
    "pandoc",
]

lint = [
    "acoular-ruff @ git+https://github.com/acoular/ci.git@ruff-v1.0",
]

unsupported = [
    "pyroomacoustics",
]

tests = [
    "diff_cover",
    "pytest",
    "pytest-cov",
    "pytest-regtest",
    "pyyaml",
    "pandas",
    "tensorflow",
]

dev = [
    {include-group = "docs"},
    {include-group = "lint"},
    {include-group = "tests"},
]

[tool.ruff]
extend = ".venv/share/ruff/ruff.acoular.toml"
src = ["src"]
extend-exclude = ["docs/source"]   # shared config's exclude resolves to its own dir, not the project root

[tool.ruff.lint]
extend-ignore = [
    # ===== Temporary migration guards (removed in the noted sub-issue) =====
    "G004", "LOG015",                    # 11  logging
    "PGH004", "RUF100", "E741",          # 10  stale-noqa cleanup / ambiguous names
    # no dedicated sub-issue -> general code cleanup, remove last
    "RUF015", "RUF021", "C419", "SIM108", "SIM114",  # 15
    "PLR5501", "PLR1711", "PLW0120",                 # 15
    "TRY",                                           # 15  exception style (TRY003/004/201)
    "EXE002",                                        # 15  exec bit (or `chmod -x src/acoupipe/*.py`)
    "W291", "W293", "COM819", "D210", "D403", "PLR2044",  # 15  whitespace/format trivia (or `ruff format`)

    # ===== Permanent — mirror Acoular's pyproject (no sub-issue; never removed) =====
    "FBT002", "FBT003",  # boolean positional args
    "PTH",               # os.path -> pathlib
    "NPY002",            # legacy numpy RNG
    "PERF4",             # list-comprehension perf
    "PLR2004",           # magic-value comparison
    "PLR091",            # too many args/branches/returns/statements
    "PLW2901",           # overwritten loop variable
    "RUF005",            # iterable concatenation
    "RUF059",            # unused unpacked variable
    "S307",              # intentional eval() in sampler
]

[tool.ruff.format]
#docstring-code-line-length = 120

[tool.ruff.lint.per-file-ignores]
# In each src entry: E501/W505 -> the file's 3-8 line-length task; D* -> 9; N*/ARG*/SLF001 -> 10
# --- src: 3 core modules ---
"src/acoupipe/base.py"                = ["D413"]
"src/acoupipe/config.py"              = ["D100"]
"src/acoupipe/version.py"             = ["D100"]
"src/acoupipe/loader.py"              = ["D413"]
"src/acoupipe/pipeline.py"            = ["D101", "D102", "D105", "D107", "D413"]
"src/acoupipe/writer.py"              = ["D102", "D205", "D212", "D413"]
# --- src: 4 samplers ---
"src/acoupipe/sampler.py"             = ["D101", "D102", "N806"]
# --- src: 5 small dataset modules ---
"src/acoupipe/datasets/base.py"       = ["D102", "D107", "D212", "D413", "D417"]
"src/acoupipe/datasets/micgeom.py"    = ["D100"]
"src/acoupipe/datasets/utils.py"      = ["D100", "D103", "D205", "D212", "D413", "N806"]
# --- src: 6 feature extraction ---
"src/acoupipe/datasets/features.py"   = ["ARG001", "ARG004", "D100", "D101", "D102", "D103", "D212", "D413", "D417", "SLF001"]
# --- src: 7 synthetic datasets ---
"src/acoupipe/datasets/synthetic.py"  = ["ARG001", "ARG004", "D102", "D103", "D107", "D205", "D212", "D413", "D416", "D417", "E501", "N806", "SLF001", "W505"]
