# --- app ---
"app/main.py" = ["A002", "D100", "D103", "DTZ005", "E501", "INP001", "PLC0415"]  # PLC0415 = intentional lazy CLI import

# --- 12 tests (targeted) ---
"tests/__init__.py"                            = ["D104"]
"tests/conftest.py"                            = ["D100", "D103"]
"tests/dummy_dataset.py"                       = ["ARG001", "ARG002", "ARG005", "D107", "D413", "F811", "F841", "PLC0415", "PLR1704", "RET505", "S301", "SLF001", "T201", "UP024", "UP028", "W505"]
"tests/miracle_test_config.py"                 = ["D107", "PLC0415"]
"tests/multiprocessing/__init__.py"            = ["D104"]
"tests/multiprocessing/conftest.py"            = ["D100", "D103"]
"tests/multiprocessing/pipeline_value_test.py" = ["ARG005", "D103", "RET504"]
"tests/multiprocessing/test_sampler.py"        = ["ARG005", "D100", "D103", "PIE808", "PT011", "S101"]
"tests/pipeline_value_test.py"                 = ["ARG005", "D103", "RET504"]
"tests/regression/__init__.py"                 = ["D104"]
"tests/regression/multiprocessing/__init__.py" = ["D104"]
"tests/regression/multiprocessing/test_datasets.py" = ["D100"]
"tests/regression/test_datasets.py"            = ["ARG005", "D100", "D103", "S101", "SIM118", "W505"]
"tests/synthetic_test_config.py"               = ["D102"]
"tests/test_dataset_tf.py"                     = ["ARG001", "PLC0415", "S101", "SIM118"]
"tests/test_dummy_dataset.py"                  = ["B007", "B905", "F841", "PLC0415", "PLW1508", "S101", "SLF001"]
"tests/test_ir.py"                             = ["ARG001", "ARG005", "D100", "D103", "EM101", "S101", "SLF001"]
"tests/test_loader.py"                         = ["D100", "S101"]
"tests/test_random_state.py"                   = ["D101", "S101", "T201"]
"tests/test_sampler.py"                        = ["ARG005", "D100", "D103", "PIE808", "PT006", "PT011", "PT014", "PT018", "S101"]
"tests/test_save_h5.py"                        = ["PLC0415", "S101"]
"tests/test_save_tfrecord.py"                  = ["ARG001", "PLC0415"]
"tests/test_spectra.py"                        = ["ARG001", "D100", "D103", "N802", "N806", "PT006", "S101", "SLF001"]
